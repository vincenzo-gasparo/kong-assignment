version: '3.9'
volumes:
  kong_db_data: {}
  playwright_node_modules: {}
networks:
  kong-ee-net:
    driver: bridge

services:
#######################################
# Postgres: Kong Database
#######################################

  kong-ee-database:
      container_name: kong-ee-database
      image: 'postgres'
      restart: on-failure
      volumes:
        - kong_db_data:/var/lib/postgresql
      networks:
        - kong-ee-net
      environment:
        POSTGRES_USER: 'kong'
        POSTGRES_DB: 'kong'
        POSTGRES_PASSWORD: 'kong'
      healthcheck:
        test: ["CMD", "pg_isready", "-U", "kong"]
        interval: 5s
        timeout: 10s
        retries: 10
      ports:
        - '5432:5432'


  #######################################
  # Kong API Gateway Classic Mode - Control Plane
  #######################################

  kong-cp:
    image: 'kong/kong-gateway'
    container_name: kong-cp
    restart: on-failure
    command: sh -c "kong migrations bootstrap && kong start"
    user: root
    networks:
      - kong-ee-net
    environment:
      KONG_PROXY_ACCESS_LOG: '/dev/stdout'
      KONG_ADMIN_ACCESS_LOG: '/dev/stdout'
      KONG_PROXY_ERROR_LOG: '/dev/stderr'
      KONG_ADMIN_ERROR_LOG: '/dev/stderr'
      KONG_DATABASE: postgres
      KONG_PASSWORD: 'handyshake'
      KONG_ADMIN_LISTEN: '0.0.0.0:8001, 0.0.0.0:8444 ssl'
      KONG_PROXY_LISTEN: '0.0.0.0:8000, 0.0.0.0:8443 ssl'
      KONG_ADMIN_GUI_URL: 'http://localhost:8002'
      KONG_PG_HOST: 'kong-ee-database'
      KONG_PG_PASSWORD: 'kong'
      KONG_PG_USER: 'kong'
    ports:
      - '8000:8000'
      - '8001:8001'
      - '8002:8002'
      - '8443:8443'
      - '8444:8444'
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 30

  #######################################
  # Playwright Test Runner
  # Uses the official Playwright Docker image with pre-installed browsers,
  # eliminating the need for `npx playwright install`.
  # Host network mode avoids CORS issues by accessing Kong via localhost.
  # Gated behind the "test" profile so it doesn't start with `docker compose up`.
  # Usage:
  #   docker compose run --rm --no-deps playwright npm ci   # install deps (once)
  #   docker compose run --rm playwright                     # run tests
  #######################################

  playwright:
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    container_name: playwright
    working_dir: /app
    volumes:
      - .:/app
      - playwright_node_modules:/app/node_modules
    network_mode: host
    environment:
      CI: 'true'
      BASE_URL: http://localhost:8002
      KONG_ADMIN_URL: http://localhost:8001
    depends_on:
      kong-cp:
        condition: service_healthy
    command: npx playwright test
    profiles:
      - test